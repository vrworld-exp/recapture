name: recapture
description: ReCapture — Guided photogrammetry capture app (MayasabhaXR Technologies)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  freezed_annotation: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.dev
    - .env.staging
    - .env.prod
