name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Flutter analyze ────────────────────────────────────────────────
  analyze:
    name: flutter-analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-3.22.x

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.PUB_CACHE }}
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos

  # ── Job 2: Flutter test ───────────────────────────────────────────────────
  test:
    name: flutter-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-3.22.x

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.PUB_CACHE }}
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run flutter test
        run: flutter test

  # ── Job 3: Build + Deploy Android ─────────────────────────────────────────
  # Builds a signed release AAB and uploads to Play Internal Testing track.
  # Runs on push to main ONLY — not on PRs, not on dev pushes.
  # Requires: PLAY_STORE_JSON_KEY and KEYSTORE_* secrets in GitHub Actions.
  #
  # PREREQUISITE SETUP (one-time, manual):
  #   1. Generate release keystore: see android/key.properties README
  #   2. Create Play Store service account JSON: see fastlane/secrets/README.md
  #   3. Add GitHub Actions secrets:
  #        PLAY_STORE_JSON_KEY       → contents of play-store-service-account.json
  #        KEYSTORE_FILE_BASE64      → base64-encoded .jks keystore file
  #        KEYSTORE_PASSWORD         → storePassword from key.properties
  #        KEY_ALIAS                 → keyAlias from key.properties
  #        KEY_PASSWORD              → keyPassword from key.properties

  build-android:
    name: build-android
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [analyze, test]
    # Only run on push to main — not on PRs, not on dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-3.22.x

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.PUB_CACHE }}
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true   # runs bundle install and caches gems automatically

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_FILE_BASE64 }}" ]; then
            echo "❌ KEYSTORE_FILE_BASE64 secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.PLAY_STORE_JSON_KEY }}" ]; then
            echo "❌ PLAY_STORE_JSON_KEY secret is not set"
            exit 1
          fi

      - name: Decode and write keystore
        env:
          KEYSTORE_FILE_BASE64: ${{ secrets.KEYSTORE_FILE_BASE64 }}
        run: |
          echo "$KEYSTORE_FILE_BASE64" | base64 --decode > android/app/recapture-release.jks

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=recapture-release.jks
          EOF

      - name: Write Play Store service account JSON
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: |
          mkdir -p fastlane/secrets
          echo "$PLAY_STORE_JSON_KEY" > fastlane/secrets/play-store-service-account.json

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Fastlane Android internal lane
        run: bundle exec fastlane android internal

  # ── Job 4: Build + Deploy iOS (STUB — DISABLED) ───────────────────────────
  # Disabled via `if: false` until iOS activation checklist is complete.
  # To activate:
  #   1. Complete all items in the iOS PLATFORM STUB checklist in fastlane/Fastfile
  #   2. Add required GitHub Actions secrets (MATCH_PASSWORD, APPLE_API_KEY_*)
  #   3. Remove the `if: false` condition from this job
  #   4. Change `runs-on` from ubuntu-latest to macos-latest
  #   5. Uncomment the real lane body in fastlane/Fastfile ios platform

  build-ios:
    name: build-ios
    runs-on: ubuntu-latest   # change to macos-latest when activating
    timeout-minutes: 45
    needs: [analyze, test]
    if: false   # STUB — remove this line when activating (see checklist above)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: iOS build not yet activated
        run: echo "iOS CI stub — see activation checklist in fastlane/Fastfile"
