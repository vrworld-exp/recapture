name: recapture
description: "ReCapture — guided photogrammetry capture app by MayasabhaXR Technologies."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^17.3.0

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Networking
  dio: ^5.4.3

  # Environment config
  flutter_dotenv: ^6.0.1

  # Device permissions
  permission_handler: ^12.0.3

  # Connectivity
  connectivity_plus: ^6.0.0

  # Code generation annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.dev
    - .env.staging
    - .env.prod
    - assets/images/
    - assets/fonts/
